<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>

<body>
    <div class="first-slide">
        <div class="container-fluid show">
            <div class="background-gif">
                <lottie-player src="https://lottie.host/f8d9a74f-948c-4a02-9741-403aab59705a/WRiUcMj6ky.json"
                    background="##FFFFFF" speed="1" style="width: 700px; height: 100vh;" loop autoplay direction="1"
                    mode="normal"></lottie-player>
            </div>

            <div class="text">
                <h1 class="title">PORTFOLIO</h1>
                <h2 class="name">Jiajie Chen</h2>
            </div>
        </div>
    </div>

    <div class="second-slide">
        <div class="container-fluid web">
            <h1 class="title">Colección de Cartas</h1>
            <div class="card-collection">
                <video height="700px" width="auto" controls>
                    <source src="video/retoCartasVideo.mp4" type="video/mp4">
                </video>
            </div>
        </div>
    </div>

    <div class="third-slide">
        <div class="container-fluid web">
            <h1 class="title">Juego Whack-A-Mole</h1>
            <div class="card-collection">
                <video height="700px" width="auto" controls muted>
                    <source src="video/juegoToposVideo.mp4" type="video/mp4">
                </video>
            </div>
        </div>
        
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/700997539d.js" crossorigin="anonymous"></script>
</body>

</html>
